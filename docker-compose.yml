version: '3.9'
services:
  api:
    build: ./apps/api
    ports: ["8000:8000"]
    volumes:
      - ./apps/api:/app
      - api_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/smart_housing.db
      - AI_PROVIDER=mock
  web:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports: ["5173:5173"]
    volumes:
      - ./apps/web:/app
volumes:
  api_data:
